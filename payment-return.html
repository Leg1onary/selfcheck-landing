<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Проверяем оплату… — НПД.Чек</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --bg: #0A0C18; --accent: #6C7FFF; --accent-2: #8B5CF6;
      --text: #EDF0FF; --text-muted: #7B82A8;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body {
      min-height: 100dvh; font-family: var(--font-body);
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center; text-align: center;
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
    .wrap { padding: 2rem; max-width: 420px; width: 100%; }
    .spinner {
      width: 52px; height: 52px;
      border: 3px solid rgba(108,127,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 2rem; }
    .progress-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); opacity: 0.2;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .progress-dots span:nth-child(2) { animation-delay: 0.3s; }
    .progress-dots span:nth-child(3) { animation-delay: 0.6s; }
    @keyframes pulse { 0%,100% { opacity: 0.2; transform: scale(1); } 50% { opacity: 1; transform: scale(1.35); } }
    h1 {
      font-family: var(--font-display); font-weight: 400;
      font-size: clamp(1.25rem, 1.1rem + 0.5vw, 1.5rem);
      line-height: 1.3; margin-bottom: 0.5rem;
    }
    .subtitle { font-size: 0.9375rem; color: var(--text-muted); line-height: 1.6; }
    .hint {
      margin-top: 1.75rem; font-size: 0.8125rem; color: var(--text-muted);
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .hint.visible { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>
<div class="wrap">
  <div class="spinner"></div>
  <div class="progress-dots" aria-hidden="true">
    <span></span><span></span><span></span>
  </div>
  <h1>Проверяем статус оплаты…</h1>
  <p class="subtitle">Это займёт несколько секунд.<br>Не закрывайте страницу.</p>
  <p class="hint" id="hint">Ожидаем подтверждение от банка — это может занять до 60 секунд.</p>
</div>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var sessionId = params.get('session_id');
  var token = params.get('token');

  if (!sessionId || !token) {
    window.location.href = '/failed.html';
    return;
  }

  var attempts = 0;
  var maxAttempts = 20;   // 8 × 3s = 24s — достаточно для webhook ЮКассы
  var hintShown = false;

  function checkStatus() {
    attempts++;

    // Показываем подсказку после 2-й попытки
    if (attempts >= 2 && !hintShown) {
      hintShown = true;
      document.getElementById('hint').classList.add('visible');
    }

    fetch('/api/session/' + encodeURIComponent(sessionId))
      .then(function (r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      })
      .then(function (data) {
        if (data.paid) {
          // ✅ Оплата подтверждена — на success с токеном
          window.location.href = '/success.html?token=' + encodeURIComponent(token) + '&session_id=' + encodeURIComponent(sessionId);
        } else if (attempts >= maxAttempts) {
          // ⏱ Таймаут — webhook не пришёл: отказ, закрытие окна или задержка банка
          window.location.href = '/failed.html?session_id=' + encodeURIComponent(sessionId) + '&token=' + encodeURIComponent(token);
        } else {
          setTimeout(checkStatus, 3000);
        }
      })
      .catch(function () {
        if (attempts >= maxAttempts) {
          window.location.href = '/failed.html?session_id=' + encodeURIComponent(sessionId) + '&token=' + encodeURIComponent(token);
        } else {
          setTimeout(checkStatus, 3000);
        }
      });
  }

  // Первая проверка через 2s — даём webhook время добраться
  setTimeout(checkStatus, 2000);
})();
</script>
</body>
</html>
